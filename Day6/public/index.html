<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day6 Web Agent Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>Day6 Web Agent Demo</h1>
        <p>一个支持流式输出、错误提示和指标展示的最小 AI Agent Web Demo</p>
      </header>

      <main class="layout">
        <section class="panel chat-panel">
          <div id="status" class="status">当前状态：idle</div>
          <div id="messages" class="messages"></div>
          <form id="chat-form" class="composer">
            <textarea id="message-input" placeholder="请输入你的问题，例如：Day4 的长期记忆保存了什么？"></textarea>
            <div class="actions">
              <button type="submit">发送</button>
              <button type="button" id="retry-button">重试上一个问题</button>
            </div>
          </form>
          <div id="error-box" class="error-box hidden"></div>
        </section>

        <aside class="panel metrics-panel">
          <h2>运行指标</h2>
          <ul>
            <li>总请求数：<span id="metric-total">0</span></li>
            <li>成功率：<span id="metric-success">0%</span></li>
            <li>平均耗时：<span id="metric-latency">0 ms</span></li>
            <li>最近成本：<span id="metric-cost">0</span></li>
            <li>最近状态：<span id="metric-status">idle</span></li>
          </ul>
        </aside>
      </main>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
